name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run contract:check
        env:
          LABACLAW_CONTRACT_PATH: ./contracts/dashboard-api-contract.example.json
      - run: npm test
      - run: npm run build
        env:
          VITE_API_BASE_URL: https://runtime.example.test
      - run: npm run package:release
        env:
          LABACLAW_WEB_RELEASE_VERSION: ${{ github.ref_name }}
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
