name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run contract:check
        env:
          LABACLAW_CONTRACT_PATH: ./contracts/dashboard-api-contract.example.json
      - run: npm test
      - run: npm run build
        env:
          VITE_API_BASE_URL: https://runtime.example.test
